version: 2

builds:
  - id: pb
    main: ./cmd/pb
    binary: pb
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  - id: pb-runtimed
    main: ./cmd/pb-runtimed
    binary: pb-runtimed
    ldflags: [-s -w]
    goos: [linux]
    goarch: [amd64, arm64]

  - id: pb-repo-adapter
    main: ./cmd/pb-repo-adapter
    binary: pb-repo-adapter
    ldflags: [-s -w]
    goos: [linux]
    goarch: [amd64, arm64]

archives:
  - id: pb-archive
    ids: [pb]
    name_template: "pb_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

  - id: sandbox-binaries
    ids: [pb-runtimed, pb-repo-adapter]
    name_template: "pb-sandbox_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

changelog:
  use: github

# brews is deprecated in favor of homebrew_casks in goreleaser v2, but homebrew_casks
# targets macOS .app bundles, not CLI formulas. brews remains functional for CLI tools.
# CI passes --skip=validate to suppress the deprecation-as-error behavior.
brews:
  - name: pb
    ids: [pb-archive]
    repository:
      owner: JadeSnow7
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    description: "PrimitiveBox CLI — checkpointed sandbox runtime for AI agents"
    homepage: "https://github.com/JadeSnow7/primitiveBox"
    install: bin.install "pb"
    test: system "#{bin}/pb", "version"
