name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Prepare Docker binaries
        run: |
          mkdir -p bin
          for binary in pb pb-runtimed pb-repo-adapter; do
            for arch in amd64 arm64; do
              src=$(find dist/ -path "*${binary}_linux_${arch}*/${binary}" -type f | head -1)
              if [ -z "$src" ]; then
                echo "ERROR: binary not found: ${binary} linux/${arch}"
                exit 1
              fi
              cp "$src" "bin/${binary}-linux-${arch}"
              chmod +x "bin/${binary}-linux-${arch}"
              echo "Prepared: bin/${binary}-linux-${arch} <- ${src}"
            done
          done
          ls -la bin/

      - uses: actions/upload-artifact@v4
        with:
          name: docker-binaries
          path: bin/
          retention-days: 1

  docker:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-binaries
          path: bin/

      - run: chmod +x bin/*

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: testdata/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jadesnow7/primitivebox-sandbox:${{ steps.version.outputs.tag }}
            ghcr.io/jadesnow7/primitivebox-sandbox:latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: testdata/docker/allinone.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jadesnow7/primitivebox-allinone:${{ steps.version.outputs.tag }}
            ghcr.io/jadesnow7/primitivebox-allinone:latest

  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inject version from tag
        run: echo "${GITHUB_REF_NAME#v}" > sdk/python/VERSION

      - name: Build wheel
        run: |
          pip install build hatchling
          python -m build sdk/python/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
