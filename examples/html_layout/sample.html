<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Layout Sample</title>
    <style>
      :root {
        --brand-color: #0f172a;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #ffffff;
        color: #111111;
        font-family: sans-serif;
      }

      .body-text {
        color: var(--brand-color);
        background-color: #ffffff;
        line-height: 1.6;
      }
    </style>
  </head>
  <body style="background-color: #ffffff; color: #111111">
    <h1>HTML Layout Demo</h1>
    <p class="body-text" style="background-color: #ffffff; color: #111111">
      PrimitiveBox app primitives can read and adjust HTML layout safely.
    </p>
    <img src="hero.png" alt="Abstract blue geometric banner" />
  </body>
</html>
