name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          set-safe-directory: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show Go toolchain
        run: go version

      - name: Run repository Go test target
        run: make test

  sdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          set-safe-directory: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Python toolchain
        run: python3 --version

      - name: Install SDK dependencies
        working-directory: sdk/python
        run: pip install hatchling && pip install -e ".[dev]"

      - name: Run repository SDK test target
        run: make sdk-test

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          set-safe-directory: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show Go and Python toolchains
        run: |
          go version
          python3 --version

      - name: Build repository binaries
        run: make build

      - name: Run end-to-end smoke test
        run: |
          python3 tests/e2e/smoke_test.py
          python3 tests/e2e/app_protocol_smoke.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          set-safe-directory: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve golangci-lint version
        id: lint-version
        run: echo "value=$(cat .golangci-version)" >> "$GITHUB_OUTPUT"

      - name: Show Go toolchain
        run: go version

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ steps.lint-version.outputs.value }}

      - name: Show golangci-lint version
        run: golangci-lint version

      - name: Run repository lint target
        run: make lint
